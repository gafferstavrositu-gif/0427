<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; background: #fdf2f8; }
    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    .animate-bounce-slow { animation: bounce 3s infinite; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl border border-pink-100">
    <div class="text-center mb-8">
      <span class="inline-block px-3 py-1 text-xs font-semibold text-pink-600 bg-pink-100 rounded-full mb-2 animate-pulse">실시간 Gemini AI 연동 중</span>
      <h1 class="text-3xl font-extrabold text-gray-800">MBTI Matcher</h1>
      <p class="text-gray-500 mt-2">환상적인 연애 궁합 분석 시스템</p>
    </div>

    <div class="space-y-6">
      <div class="bg-white/50 p-5 rounded-2xl border border-white">
        <h2 class="text-lg font-bold text-gray-700 mb-3 flex items-center">
          <span class="mr-2">📝</span> 시트 입력 가이드
        </h2>
        <ul class="text-sm text-gray-600 space-y-3">
          <li class="flex items-start">
            <span class="flex items-center justify-center w-5 h-5 bg-pink-500 text-white text-[10px] rounded-full mr-2 mt-0.5">1</span>
            <span><b>A열</b>에 학생의 이름을 입력하세요.</span>
          </li>
          <li class="flex items-start">
            <span class="flex items-center justify-center w-5 h-5 bg-pink-500 text-white text-[10px] rounded-full mr-2 mt-0.5">2</span>
            <span><b>B열</b>에 학생의 MBTI를 입력하세요.</span>
          </li>
          <li class="flex items-start">
            <span class="flex items-center justify-center w-5 h-5 bg-pink-500 text-white text-[10px] rounded-full mr-2 mt-0.5">3</span>
            <span><b>C열</b>에 <b>연인의 MBTI</b>를 입력하세요.</span>
          </li>
        </ul>
      </div>

      <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
        <p class="text-xs text-blue-700 leading-relaxed">
          💡 <b>중요:</b> 앱스 스크립트 에디터에서 왼쪽 <b>[+]</b> 버튼을 눌러 <b>HTML</b> 파일을 만들고, 이름을 반드시 <code class="bg-blue-200 px-1 rounded">index</code>로 설정해야 에러가 사라집니다.
        </p>
      </div>

      <button onclick="google.script.host.close()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold rounded-2xl shadow-lg hover:from-pink-600 hover:to-rose-600 transition-all transform active:scale-95">
        안내 확인 완료
      </button>
    </div>
    
    <p class="text-center text-[10px] text-gray-400 mt-6">© 2024 MBTI AI Analysis System</p>
  </div>
</body>
</html>
